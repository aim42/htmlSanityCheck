tasks.register("buildMavenPuginWithMaven") {
    group("compile")
    description("Use maven to build the maven plugin")

    final String BUILD_DIRECTORY = "htmlsanitycheck-maven-plugin"

    doLast {
        def result = exec {
            workingDir BUILD_DIRECTORY
            commandLine System.getProperty("os.name") ==~ /Windows.*/ ? "mvnw.bat" : "./mvnw",
                    "clean", "install", "-DhtmlSanityCheckVersion ${project.version}", "-ssettings.xml"
        }
        logger.debug "Script output: $result"
    }
}

buildMavenPuginWithMaven.mustRunAfter(
        ':htmlSanityCheck-core:publishAllPublicationsToMyLocalRepositoryForFullIntegrationTestsRepository',
)

buildMavenPuginWithMaven.dependsOn(
        ':htmlSanityCheck-core:publishAllPublicationsToMyLocalRepositoryForFullIntegrationTestsRepository',
)